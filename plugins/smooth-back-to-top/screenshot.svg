<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="Smooth Back to Top preview">
  <defs>
    <linearGradient id="sbtt-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="sbtt-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="1200" height="900" fill="url(#sbtt-bg)"/>

  <!-- Browser chrome -->
  <rect x="80" y="70" width="1040" height="760" rx="18" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <rect x="80" y="70" width="1040" height="56" rx="18" fill="#f1f5f9"/>
  <rect x="80" y="108" width="1040" height="18" fill="#f1f5f9"/>
  <circle cx="116" cy="98" r="8" fill="#f87171"/>
  <circle cx="144" cy="98" r="8" fill="#fbbf24"/>
  <circle cx="172" cy="98" r="8" fill="#34d399"/>
  <rect x="210" y="86" width="820" height="24" rx="12" fill="#e2e8f0"/>

  <!-- Mock article content -->
  <rect x="140" y="180" width="520" height="40" rx="8" fill="#1f2937"/>
  <rect x="140" y="252" width="840" height="16" rx="8" fill="#cbd5e1"/>
  <rect x="140" y="288" width="840" height="16" rx="8" fill="#cbd5e1"/>
  <rect x="140" y="324" width="760" height="16" rx="8" fill="#cbd5e1"/>
  <rect x="140" y="384" width="840" height="16" rx="8" fill="#e2e8f0"/>
  <rect x="140" y="420" width="840" height="16" rx="8" fill="#e2e8f0"/>
  <rect x="140" y="456" width="700" height="16" rx="8" fill="#e2e8f0"/>
  <rect x="140" y="516" width="840" height="16" rx="8" fill="#eef2f7"/>
  <rect x="140" y="552" width="840" height="16" rx="8" fill="#eef2f7"/>
  <rect x="140" y="588" width="620" height="16" rx="8" fill="#eef2f7"/>

  <!-- Floating back-to-top button -->
  <g filter="url(#sbtt-shadow)">
    <circle cx="1012" cy="752" r="40" fill="#111827"/>
    <polyline points="992 762 1012 742 1032 762" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Tooltip / label -->
  <g>
    <rect x="836" y="736" width="132" height="34" rx="8" fill="#111827"/>
    <polygon points="968 753 982 745 982 761" fill="#111827"/>
    <text x="902" y="758" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">Back to top</text>
  </g>

  <!-- Caption -->
  <text x="600" y="868" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="22" font-weight="600" fill="#475569" text-anchor="middle">Smooth Back to Top — accessible, fades in on scroll</text>
</svg>
