<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" font-family="ui-monospace, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="cover1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c3b2c"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="cover2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d2030"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.018" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background + faint grid wash -->
  <rect width="1200" height="900" fill="#0a0a0a"/>
  <rect width="1200" height="900" fill="url(#grid)"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="92" fill="#0a0a0a" fill-opacity="0.9"/>
  <rect x="64" y="26" width="40" height="40" fill="none" stroke="#3a3a3a" stroke-width="1"/>
  <text x="120" y="58" font-family="Arial Black, Impact, sans-serif" font-size="30" font-weight="900" fill="#f5f5f5" letter-spacing="-1.5">MONOLITH</text>
  <g font-size="13" fill="#c2c2c2" letter-spacing="2" font-weight="700">
    <text x="744" y="52">WORK</text>
    <text x="836" y="52">STUDIO</text>
    <text x="952" y="52">CONTACT</text>
  </g>
  <line x1="952" y1="62" x2="1068" y2="62" stroke="#00e5a0" stroke-width="2"/>
  <line x1="0" y1="92" x2="1200" y2="92" stroke="#3a3a3a" stroke-width="1"/>

  <!-- Masthead kicker -->
  <rect x="64" y="132" width="150" height="28" fill="none" stroke="#00e5a0" stroke-width="1"/>
  <text x="80" y="151" font-size="12" font-weight="700" fill="#00e5a0" letter-spacing="3">SELECTED WORK</text>

  <!-- Oversized statement title (spans full content width when a sidebar is present) -->
  <g font-family="Arial Black, Impact, sans-serif" font-weight="900" fill="#f5f5f5" letter-spacing="-5">
    <text x="60" y="252" font-size="96">IDEAS WORTH</text>
    <text x="60" y="338" font-size="96">SHIPPING<tspan fill="#00e5a0">.</tspan></text>
  </g>
  <text x="64" y="378" font-size="16" fill="#c2c2c2">The studio journal of Monolith — design, engineering, and the craft behind the work.</text>
  <g font-size="12" fill="#8a8a8a" letter-spacing="2" font-weight="700">
    <text x="64" y="408">STUDIO JOURNAL <tspan fill="#00e5a0">/</tspan> BRUTALIST BY DESIGN <tspan fill="#00e5a0">/</tspan> 2026</text>
  </g>
  <line x1="64" y1="430" x2="1136" y2="430" stroke="#3a3a3a" stroke-width="1"/>

  <!-- Section label -->
  <text x="64" y="470" font-size="12" font-weight="700" fill="#8a8a8a" letter-spacing="3">LATEST</text>
  <line x1="128" y1="466" x2="788" y2="466" stroke="#262626" stroke-width="1"/>

  <!-- Content + sidebar split (single-column card stack, as rendered with an active sidebar) -->

  <!-- Project card 1 (full content width beside the sidebar) -->
  <rect x="64" y="490" width="724" height="300" fill="#121212" stroke="#262626" stroke-width="1"/>
  <rect x="65" y="491" width="722" height="180" fill="url(#cover1)"/>
  <line x1="65" y1="671" x2="787" y2="671" stroke="#262626" stroke-width="1"/>
  <rect x="65" y="491" width="34" height="22" fill="#00e5a0"/>
  <text x="72" y="507" font-size="12" font-weight="700" fill="#04150e">01</text>
  <rect x="712" y="491" width="75" height="24" fill="#0a0a0a" fill-opacity="0.82" stroke="#3a3a3a" stroke-width="1"/>
  <text x="724" y="507" font-size="11" font-weight="700" fill="#f5f5f5" letter-spacing="1">DESIGN</text>
  <text x="84" y="710" font-family="Arial Black, Impact, sans-serif" font-size="30" font-weight="900" fill="#f5f5f5" letter-spacing="-1">CONCRETE SIGNALS</text>
  <text x="84" y="736" font-size="11" fill="#8a8a8a" letter-spacing="1">BY MARA ELLISON <tspan fill="#3a3a3a">/</tspan> JUN 18, 2026</text>
  <text x="84" y="764" font-size="13" fill="#c2c2c2">A brand system built on hard edges and an electric accent — oversized type, a stark grid…</text>

  <!-- Project card 2 -->
  <rect x="64" y="810" width="724" height="60" fill="#121212" stroke="#262626" stroke-width="1"/>
  <rect x="64" y="810" width="34" height="22" fill="#00e5a0"/>
  <text x="71" y="826" font-size="12" font-weight="700" fill="#04150e">02</text>
  <text x="120" y="848" font-family="Arial Black, Impact, sans-serif" font-size="26" font-weight="900" fill="#f5f5f5" letter-spacing="-1">GRID THEORY</text>

  <!-- Sidebar: Search widget -->
  <rect x="824" y="490" width="312" height="120" fill="#121212" stroke="#3a3a3a" stroke-width="1"/>
  <text x="844" y="524" font-size="12" font-weight="700" fill="#00e5a0" letter-spacing="2">// SEARCH</text>
  <line x1="844" y1="536" x2="1116" y2="536" stroke="#262626" stroke-width="1"/>
  <rect x="844" y="554" width="200" height="36" fill="#0a0a0a" stroke="#3a3a3a" stroke-width="1"/>
  <text x="856" y="577" font-size="12" fill="#8a8a8a">Search…</text>
  <rect x="1052" y="554" width="64" height="36" fill="#00e5a0"/>
  <text x="1075" y="577" font-size="11" font-weight="700" fill="#04150e" letter-spacing="1">GO</text>

  <!-- Sidebar: Categories widget -->
  <rect x="824" y="626" width="312" height="204" fill="#121212" stroke="#3a3a3a" stroke-width="1"/>
  <text x="844" y="660" font-size="12" font-weight="700" fill="#00e5a0" letter-spacing="2">// CATEGORIES</text>
  <line x1="844" y1="672" x2="1116" y2="672" stroke="#262626" stroke-width="1"/>
  <g font-size="13" fill="#c2c2c2">
    <text x="844" y="700">Design</text>
    <text x="844" y="736">Engineering</text>
    <text x="844" y="772">Craft</text>
    <text x="844" y="808">Ideas</text>
  </g>
  <line x1="844" y1="714" x2="1116" y2="714" stroke="#262626" stroke-width="1"/>
  <line x1="844" y1="750" x2="1116" y2="750" stroke="#262626" stroke-width="1"/>
  <line x1="844" y1="786" x2="1116" y2="786" stroke="#262626" stroke-width="1"/>

  <!-- Footer -->
  <line x1="0" y1="876" x2="1200" y2="876" stroke="#3a3a3a" stroke-width="1"/>
  <text x="64" y="900" font-family="Arial Black, Impact, sans-serif" font-size="18" font-weight="900" fill="#f5f5f5" letter-spacing="-1">MONO<tspan fill="#00e5a0">/</tspan>LITH</text>
  <text x="1136" y="899" font-size="12" fill="#8a8a8a" letter-spacing="2" text-anchor="end">© 2026 MONOLITH — BUILT WITH MONOLITH</text>
</svg>
