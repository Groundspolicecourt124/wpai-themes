<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" font-family="Georgia, 'Times New Roman', serif">
  <!-- Paper background -->
  <rect width="1200" height="900" fill="#faf8f4"/>

  <!-- Heavy top rule (masthead) -->
  <rect x="0" y="0" width="1200" height="8" fill="#16130f"/>

  <!-- Masthead title + tagline -->
  <text x="80" y="120" font-size="76" font-weight="700" fill="#16130f" letter-spacing="-1.5">Ledger</text>
  <text x="84" y="152" font-family="Helvetica, Arial, sans-serif" font-size="15" letter-spacing="6" fill="#8a8276">THE EDITORIAL REVIEW</text>
  <line x1="80" y1="178" x2="1120" y2="178" stroke="#ddd6c9" stroke-width="1"/>

  <!-- Nav bar -->
  <line x1="80" y1="222" x2="1120" y2="222" stroke="#ddd6c9" stroke-width="1"/>
  <g font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2.5">
    <text x="80" y="206" fill="#b00020">HOME</text>
    <text x="180" y="206" fill="#4a443c">POLITICS</text>
    <text x="310" y="206" fill="#4a443c">CULTURE</text>
    <text x="435" y="206" fill="#4a443c">BUSINESS</text>
    <text x="575" y="206" fill="#4a443c">OPINION</text>
  </g>

  <!-- Column rule between content and sidebar -->
  <line x1="830" y1="270" x2="830" y2="840" stroke="#ddd6c9" stroke-width="1"/>

  <!-- ===== Main article column ===== -->
  <!-- Kicker -->
  <text x="80" y="300" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="3" fill="#b00020">CULTURE</text>
  <!-- Headline -->
  <text x="80" y="350" font-size="46" font-weight="700" fill="#16130f" letter-spacing="-1">The Long Read on</text>
  <text x="80" y="402" font-size="46" font-weight="700" fill="#16130f" letter-spacing="-1">Typographic Order</text>
  <!-- Byline (small caps) -->
  <text x="80" y="436" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2" fill="#16130f">BY A. EDITOR
    <tspan fill="#8a8276" font-weight="400"> &#183; JUNE 20, 2026</tspan>
  </text>
  <line x1="80" y1="456" x2="790" y2="456" stroke="#ddd6c9" stroke-width="1"/>

  <!-- Drop cap -->
  <text x="78" y="552" font-size="96" font-weight="700" fill="#b00020">T</text>
  <!-- Body lines (paragraph 1, wraps around drop cap) -->
  <g fill="#16130f">
    <rect x="148" y="490" width="642" height="10" rx="2"/>
    <rect x="148" y="514" width="642" height="10" rx="2"/>
    <rect x="148" y="538" width="600" height="10" rx="2"/>
    <rect x="80" y="566" width="710" height="10" rx="2"/>
    <rect x="80" y="590" width="710" height="10" rx="2"/>
    <rect x="80" y="614" width="540" height="10" rx="2"/>
  </g>

  <!-- Subhead -->
  <text x="80" y="678" font-size="30" font-weight="700" fill="#16130f" letter-spacing="-0.5">A second movement</text>
  <g fill="#16130f">
    <rect x="80" y="704" width="710" height="10" rx="2"/>
    <rect x="80" y="728" width="710" height="10" rx="2"/>
    <rect x="80" y="752" width="670" height="10" rx="2"/>
  </g>

  <!-- Pull-quote accent rule -->
  <rect x="80" y="784" width="4" height="56" fill="#b00020"/>
  <text x="104" y="812" font-size="22" font-style="italic" fill="#4a443c">"Order is the quiet</text>
  <text x="104" y="838" font-size="22" font-style="italic" fill="#4a443c">authority of the page."</text>

  <!-- ===== Sidebar column ===== -->
  <!-- Widget 1 -->
  <text x="870" y="300" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2.5" fill="#16130f">MOST READ</text>
  <rect x="870" y="312" width="250" height="3" fill="#16130f"/>
  <g fill="#16130f">
    <rect x="870" y="340" width="250" height="9" rx="2"/>
    <rect x="870" y="358" width="180" height="9" rx="2"/>
    <line x1="870" y1="382" x2="1120" y2="382" stroke="#ddd6c9" stroke-width="1"/>
    <rect x="870" y="402" width="250" height="9" rx="2"/>
    <rect x="870" y="420" width="200" height="9" rx="2"/>
    <line x1="870" y1="444" x2="1120" y2="444" stroke="#ddd6c9" stroke-width="1"/>
    <rect x="870" y="464" width="240" height="9" rx="2"/>
    <rect x="870" y="482" width="160" height="9" rx="2"/>
  </g>

  <!-- Widget 2 -->
  <text x="870" y="556" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2.5" fill="#16130f">CATEGORIES</text>
  <rect x="870" y="568" width="250" height="3" fill="#16130f"/>
  <g fill="#16130f">
    <rect x="870" y="596" width="150" height="9" rx="2"/>
    <line x1="870" y1="620" x2="1120" y2="620" stroke="#ddd6c9" stroke-width="1"/>
    <rect x="870" y="640" width="190" height="9" rx="2"/>
    <line x1="870" y1="664" x2="1120" y2="664" stroke="#ddd6c9" stroke-width="1"/>
    <rect x="870" y="684" width="130" height="9" rx="2"/>
  </g>

  <!-- Search submit button (accent) -->
  <rect x="870" y="730" width="130" height="38" fill="#b00020"/>
  <text x="895" y="755" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2" fill="#ffffff">SEARCH</text>

  <!-- Footer rule -->
  <rect x="0" y="868" width="1200" height="6" fill="#16130f"/>
  <text x="600" y="892" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" letter-spacing="2" fill="#4a443c">&#169; 2026 LEDGER &#183; SET IN LEDGER</text>
</svg>
