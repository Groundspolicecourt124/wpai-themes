<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <!-- Lead-story featured image: a full-bleed gradient cover, like the demo posts -->
    <linearGradient id="lead" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b23a48"/>
      <stop offset="0.55" stop-color="#7d0014"/>
      <stop offset="1" stop-color="#2a0f14"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3d4a5c"/>
      <stop offset="1" stop-color="#161d28"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9a7b3f"/>
      <stop offset="1" stop-color="#4a3614"/>
    </linearGradient>
  </defs>

  <!-- Paper background -->
  <rect width="1200" height="900" fill="#faf8f4"/>

  <!-- Dateline strip -->
  <rect x="0" y="0" width="1200" height="26" fill="#16130f"/>
  <text x="80" y="18" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="2.4" fill="#faf8f4">JUNE 21, 2026 · VOL. 2026</text>
  <text x="1120" y="18" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="2.4" fill="#e7b8bf">THE EDITORIAL REVIEW</text>

  <!-- Heavy top rule of masthead -->
  <rect x="0" y="26" width="1200" height="6" fill="#16130f"/>

  <!-- Centered masthead with flanking rules -->
  <line x1="80" y1="78" x2="430" y2="78" stroke="#ddd5c7" stroke-width="1"/>
  <line x1="770" y1="78" x2="1120" y2="78" stroke="#ddd5c7" stroke-width="1"/>
  <text x="600" y="92" text-anchor="middle" font-size="74" font-weight="700" fill="#16130f" letter-spacing="-1.6">Northwind</text>
  <text x="600" y="120" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" letter-spacing="7" fill="#756c5e">IDEAS WORTH SHIPPING.</text>

  <!-- Sticky nav (centered, bordered) -->
  <line x1="0" y1="146" x2="1200" y2="146" stroke="#16130f" stroke-width="1.5"/>
  <line x1="0" y1="186" x2="1200" y2="186" stroke="#16130f" stroke-width="1.5"/>
  <g font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2.6" text-anchor="middle">
    <text x="468" y="171" fill="#a4001a">HOME</text>
    <rect x="436" y="183" width="64" height="3" fill="#a4001a"/>
    <text x="558" y="171" fill="#463f37">ABOUT</text>
    <text x="652" y="171" fill="#463f37">DESIGN</text>
    <text x="758" y="171" fill="#463f37">ENGINEERING</text>
  </g>

  <!-- ===================== LEAD STORY (full width) ===================== -->
  <!-- Lead featured image (right) -->
  <rect x="650" y="222" width="470" height="352" fill="url(#lead)"/>
  <circle cx="990" cy="300" r="80" fill="#ffffff" opacity="0.06"/>
  <circle cx="760" cy="500" r="120" fill="#000000" opacity="0.10"/>

  <!-- Lead body (left) -->
  <text x="80" y="262" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="3" fill="#a4001a">DESIGN</text>
  <rect x="80" y="272" width="62" height="2.5" fill="#a4001a"/>
  <text x="80" y="330" font-size="52" font-weight="700" fill="#16130f" letter-spacing="-1.4">Designing for</text>
  <text x="80" y="386" font-size="52" font-weight="700" fill="#16130f" letter-spacing="-1.4">the long now</text>
  <!-- Byline -->
  <text x="80" y="420" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="1.5" fill="#16130f">BY MARA ELLISON
    <tspan fill="#756c5e" font-weight="400"> &#183; JUNE 21, 2026</tspan>
  </text>
  <!-- Standfirst -->
  <g fill="#463f37">
    <rect x="80" y="446" width="520" height="11" rx="2"/>
    <rect x="80" y="470" width="520" height="11" rx="2"/>
    <rect x="80" y="494" width="430" height="11" rx="2"/>
  </g>
  <text x="80" y="546" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2" fill="#a4001a">READ THE LEAD STORY &#8594;</text>

  <!-- Double rule dividing lead from the grid -->
  <line x1="80" y1="600" x2="1120" y2="600" stroke="#16130f" stroke-width="1"/>
  <line x1="80" y1="604" x2="1120" y2="604" stroke="#16130f" stroke-width="1"/>

  <!-- ===================== MORE STORIES + SIDEBAR ===================== -->
  <!-- Section heading -->
  <text x="80" y="648" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="3" fill="#16130f">MORE STORIES</text>
  <line x1="240" y1="644" x2="790" y2="644" stroke="#16130f" stroke-width="1"/>

  <!-- Card 1 -->
  <rect x="80" y="672" width="340" height="104" fill="url(#card1)"/>
  <text x="80" y="800" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="2.5" fill="#a4001a">ENGINEERING</text>
  <text x="80" y="828" font-size="26" font-weight="700" fill="#16130f" letter-spacing="-0.5">Shipping less, often</text>
  <rect x="80" y="846" width="330" height="9" rx="2" fill="#463f37"/>

  <!-- Card 2 -->
  <rect x="450" y="672" width="340" height="104" fill="url(#card2)"/>
  <text x="450" y="800" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="2.5" fill="#a4001a">CRAFT</text>
  <text x="450" y="828" font-size="26" font-weight="700" fill="#16130f" letter-spacing="-0.5">The weight of a rule</text>
  <rect x="450" y="846" width="330" height="9" rx="2" fill="#463f37"/>

  <!-- Column rule before sidebar -->
  <line x1="830" y1="624" x2="830" y2="858" stroke="#ddd5c7" stroke-width="1"/>

  <!-- Sidebar: Search widget -->
  <text x="870" y="648" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2.5" fill="#16130f">SEARCH</text>
  <rect x="870" y="658" width="250" height="2.5" fill="#16130f"/>
  <rect x="870" y="676" width="178" height="36" fill="#fffdf9" stroke="#ddd5c7" stroke-width="1"/>
  <rect x="1052" y="676" width="68" height="36" fill="#a4001a"/>
  <text x="1086" y="699" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="1.5" fill="#ffffff">GO</text>

  <!-- Sidebar: Recent Posts widget -->
  <text x="870" y="752" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2.5" fill="#16130f">RECENT POSTS</text>
  <rect x="870" y="762" width="250" height="2.5" fill="#16130f"/>
  <g fill="#16130f" font-family="Helvetica, Arial, sans-serif">
    <rect x="870" y="784" width="240" height="9" rx="2"/>
    <line x1="870" y1="806" x2="1120" y2="806" stroke="#ddd5c7" stroke-width="1"/>
    <rect x="870" y="822" width="200" height="9" rx="2"/>
    <line x1="870" y1="844" x2="1120" y2="844" stroke="#ddd5c7" stroke-width="1"/>
  </g>

  <!-- Footer rule -->
  <rect x="0" y="872" width="1200" height="6" fill="#16130f"/>
  <text x="600" y="895" text-anchor="middle" font-size="17" font-weight="700" fill="#16130f" letter-spacing="-0.5">Northwind</text>
</svg>
