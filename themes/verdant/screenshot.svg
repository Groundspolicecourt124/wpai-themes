  <rect x="812" y="260" width="316" height="196" rx="22" fill="#ffffff" stroke="#dde7d4"/>
  <circle cx="844" cy="294" r="5" fill="#5f9265"/>
  <text x="858" y="299" font-size="12" font-weight="700" letter-spacing="1.6" fill="#2c5639">RECENT POSTS</text>
  <rect x="836" y="316" width="252" height="9" rx="4.5" fill="#e9efe2"/>
  <line x1="836" y1="342" x2="1104" y2="342" stroke="#dde7d4" stroke-dasharray="3 4"/>
  <rect x="836" y="356" width="236" height="9" rx="4.5" fill="#e9efe2"/>
  <line x1="836" y1="382" x2="1104" y2="382" stroke="#dde7d4" stroke-dasharray="3 4"/>
  <rect x="836" y="396" width="216" height="9" rx="4.5" fill="#e9efe2"/>
  <line x1="836" y1="422" x2="1104" y2="422" stroke="#dde7d4" stroke-dasharray="3 4"/>
  <rect x="836" y="436" width="190" height="9" rx="4.5" fill="#e9efe2"/>

  <!-- Categories -->
  <rect x="812" y="480" width="316" height="232" rx="22" fill="#ffffff" stroke="#dde7d4"/>
  <circle cx="844" cy="514" r="5" fill="#5f9265"/>
  <text x="858" y="519" font-size="12" font-weight="700" letter-spacing="1.6" fill="#2c5639">CATEGORIES</text>
  <rect x="836" y="536" width="150" height="9" rx="4.5" fill="#e9efe2"/>
  <line x1="836" y1="562" x2="1104" y2="562" stroke="#dde7d4" stroke-dasharray="3 4"/>
  <rect x="836" y="576" width="180" height="9" rx="4.5" fill="#e9efe2"/>
  <line x1="836" y1="602" x2="1104" y2="602" stroke="#dde7d4" stroke-dasharray="3 4"/>
  <rect x="836" y="616" width="132" height="9" rx="4.5" fill="#e9efe2"/>
  <line x1="836" y1="642" x2="1104" y2="642" stroke="#dde7d4" stroke-dasharray="3 4"/>
  <rect x="836" y="656" width="164" height="9" rx="4.5" fill="#e9efe2"/>
  <line x1="836" y1="682" x2="1104" y2="682" stroke="#dde7d4" stroke-dasharray="3 4"/>
  <rect x="836" y="696" width="120" height="9" rx="4.5" fill="#e9efe2"/>

  <!-- Tag cloud pills -->
  <rect x="812" y="736" width="316" height="116" rx="22" fill="#ffffff" stroke="#dde7d4"/>
  <circle cx="844" cy="770" r="5" fill="#5f9265"/>
  <text x="858" y="775" font-size="12" font-weight="700" letter-spacing="1.6" fill="#2c5639">ARCHIVES</text>
  <rect x="836" y="790" width="84" height="24" rx="12" fill="#e4efdd"/>
  <rect x="930" y="790" width="64" height="24" rx="12" fill="#e4efdd"/>
  <rect x="1004" y="790" width="100" height="24" rx="12" fill="#e4efdd"/>
  <rect x="836" y="822" width="72" height="24" rx="12" fill="#e4efdd"/>
  <rect x="918" y="822" width="92" height="24" rx="12" fill="#e4efdd"/>

  <!-- ===== Footer ===== -->
  <rect x="0" y="868" width="1200" height="32" fill="url(#footerg)"/>
  <text x="600" y="889" font-size="13" fill="#cfe0cd" text-anchor="middle">&#10087;  © 2026 Northwind. Grown with Verdant.</text>
</svg>
