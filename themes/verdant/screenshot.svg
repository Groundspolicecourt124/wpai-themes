<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" font-family="'Avenir Next','Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="accentStrip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e4efdd"/>
      <stop offset="0.4" stop-color="#5f9265"/>
      <stop offset="1" stop-color="#2c5639"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e4efdd"/>
    </linearGradient>
    <linearGradient id="cover1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7fae7c"/>
      <stop offset="1" stop-color="#2c5639"/>
    </linearGradient>
    <linearGradient id="cover2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c9883f"/>
      <stop offset="1" stop-color="#5f9265"/>
    </linearGradient>
    <radialGradient id="sprig" cx="35%" cy="35%" r="65%">
      <stop offset="0" stop-color="#5f9265" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#5f9265" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="footerg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#21412c"/>
      <stop offset="1" stop-color="#2c5639"/>
    </linearGradient>
  </defs>

  <!-- Paper canvas -->
  <rect width="1200" height="900" fill="#f3f6ef"/>
  <ellipse cx="1180" cy="40" rx="360" ry="220" fill="#f0f6ea"/>

  <!-- ===== Header ===== -->
  <rect x="0" y="0" width="1200" height="96" fill="#ffffff"/>
  <rect x="0" y="96" width="1200" height="4" fill="url(#accentStrip)"/>
  <text x="72" y="58" font-size="30" fill="#5f9265" font-family="'Iowan Old Style',Palatino,Georgia,serif">&#10087;</text>
  <text x="106" y="58" font-size="30" font-weight="600" fill="#1f3527" font-family="'Iowan Old Style',Palatino,Georgia,serif">Northwind</text>

  <!-- Pill nav -->
  <rect x="724" y="34" width="74" height="34" rx="17" fill="#4e7d53"/>
  <text x="761" y="56" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Home</text>
  <text x="852" y="56" font-size="15" font-weight="700" fill="#46604f" text-anchor="middle">About</text>
  <text x="952" y="56" font-size="15" font-weight="700" fill="#46604f" text-anchor="middle">Design</text>
  <text x="1078" y="56" font-size="15" font-weight="700" fill="#46604f" text-anchor="middle">Engineering</text>

  <!-- ===== Welcome hero ===== -->
  <rect x="72" y="140" width="700" height="208" rx="28" fill="url(#hero)" stroke="#dde7d4"/>
  <circle cx="752" cy="158" r="120" fill="url(#sprig)"/>
  <text x="104" y="190" font-size="13" font-weight="700" letter-spacing="2.4" fill="#2c5639">&#10087;  WELCOME</text>
  <text x="104" y="248" font-size="44" font-weight="600" fill="#21412c" font-family="'Iowan Old Style',Palatino,Georgia,serif">Ideas worth shipping.</text>
  <text x="104" y="296" font-size="17" fill="#46604f">Stories, notes, and ideas — gathered slowly and shared</text>
  <text x="104" y="320" font-size="17" fill="#46604f">with care. Settle in and read a while.</text>

  <!-- Section label -->
  <text x="72" y="392" font-size="13" font-weight="700" letter-spacing="2.4" fill="#5e7360">LATEST STORIES</text>
  <line x1="248" y1="387" x2="772" y2="387" stroke="#dde7d4"/>

  <!-- ===== Lead card (featured image) ===== -->
  <rect x="72" y="412" width="700" height="300" rx="22" fill="#ffffff" stroke="#dde7d4"/>
  <path d="M72 434a22 22 0 0 1 22-22h656a22 22 0 0 1 22 22v124H72z" fill="url(#cover1)"/>
  <!-- leafy motif on cover -->
  <path d="M150 540c-24-40-12-86 40-118 0 40-4 84-24 118 14-30 30-60 56-86-10 40-24 70-30 102 30-8 44-32 44-58 4 30-10 56-40 64-18 4-36-2-46-22z" fill="#ffffff" opacity="0.22"/>
  <circle cx="690" cy="468" r="34" fill="#ffffff" opacity="0.18"/>
  <!-- eyebrow pill -->
  <rect x="104" y="582" width="92" height="26" rx="13" fill="#e4efdd"/>
  <text x="150" y="600" font-size="12" font-weight="700" letter-spacing="1.2" fill="#2c5639" text-anchor="middle">DESIGN</text>
  <text x="104" y="642" font-size="28" font-weight="600" fill="#1f3527" font-family="'Iowan Old Style',Palatino,Georgia,serif">Slow mornings, shipped ideas</text>
  <text x="104" y="668" font-size="13" fill="#5e7360">June 14, 2026 · by <tspan fill="#46604f" font-weight="700">Mara Ellison</tspan></text>
  <rect x="104" y="682" width="560" height="9" rx="4.5" fill="#e9efe2"/>
  <text x="104" y="704" font-size="14" font-weight="700" fill="#2c5639">Continue reading →</text>

  <!-- ===== Compact card (image left) ===== -->
  <rect x="72" y="732" width="700" height="120" rx="22" fill="#ffffff" stroke="#dde7d4"/>
  <path d="M72 754a22 22 0 0 1 22-22h168v120H94a22 22 0 0 1-22-22z" fill="url(#cover2)"/>
  <circle cx="178" cy="792" r="24" fill="#ffffff" opacity="0.18"/>
  <rect x="290" y="752" width="80" height="24" rx="12" fill="#e4efdd"/>
  <text x="330" y="769" font-size="11" font-weight="700" letter-spacing="1" fill="#2c5639" text-anchor="middle">CRAFT</text>
  <text x="290" y="804" font-size="22" font-weight="600" fill="#1f3527" font-family="'Iowan Old Style',Palatino,Georgia,serif">Five calming notes on focus</text>
  <text x="290" y="828" font-size="13" fill="#5e7360">June 2, 2026 · by Mara Ellison</text>

  <!-- ===== Sidebar widgets ===== -->
  <!-- Search -->
  <rect x="812" y="140" width="316" height="96" rx="22" fill="#ffffff" stroke="#dde7d4"/>
  <circle cx="844" cy="174" r="5" fill="#5f9265"/>
  <text x="858" y="179" font-size="12" font-weight="700" letter-spacing="1.6" fill="#2c5639">SEARCH</text>
  <rect x="836" y="192" width="196" height="30" rx="10" fill="#f3f6ef" stroke="#dde7d4"/>
  <rect x="1040" y="192" width="64" height="30" rx="15" fill="#4e7d53"/>

