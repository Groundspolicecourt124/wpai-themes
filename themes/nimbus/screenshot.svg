<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="card" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1e2230" flood-opacity="0.07"/>
    </filter>
    <filter id="btn" x="-30%" y="-30%" width="160%" height="190%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#6366f1" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Canvas -->
  <rect width="1200" height="900" fill="#f7f8fc"/>

  <!-- Sticky header -->
  <rect x="0" y="0" width="1200" height="92" fill="#ffffff"/>
  <line x1="0" y1="92" x2="1200" y2="92" stroke="#e6e9f2" stroke-width="2"/>
  <text x="80" y="58" font-size="34" font-weight="800" letter-spacing="-1" fill="url(#grad)">Nimbus</text>
  <g font-size="17" font-weight="600">
    <rect x="772" y="32" width="84" height="36" rx="18" fill="url(#grad)"/>
    <text x="792" y="56" fill="#ffffff">Home</text>
    <text x="884" y="56" fill="#4a5168">Product</text>
    <text x="996" y="56" fill="#4a5168">Pricing</text>
    <text x="1092" y="56" fill="#4a5168">Blog</text>
  </g>

  <!-- Card 1 -->
  <rect x="80" y="150" width="1040" height="288" rx="20" fill="#ffffff" stroke="#e6e9f2" stroke-width="2" filter="url(#card)"/>
  <text x="120" y="222" font-size="40" font-weight="700" letter-spacing="-1" fill="#1e2230">Ship your launch in days, not months</text>
  <text x="120" y="258" font-size="16" font-weight="600" fill="#8b93a7">June 18, 2026 · by <tspan fill="#4f46e5">Anthony</tspan></text>
  <g font-size="20" fill="#4a5168">
    <text x="120" y="306">Nimbus gives SaaS teams a bright, conversion-ready home page out of</text>
    <text x="120" y="338">the box — floating cards, roomy spacing, and a gradient that pulls every</text>
    <text x="120" y="370">eye straight to the call-to-action button.</text>
  </g>
  <rect x="120" y="392" width="172" height="40" rx="20" fill="url(#grad)" filter="url(#btn)"/>
  <text x="142" y="418" font-size="16" font-weight="700" fill="#ffffff">Read more →</text>

  <!-- Card 2 -->
  <rect x="80" y="478" width="1040" height="288" rx="20" fill="#ffffff" stroke="#e6e9f2" stroke-width="2" filter="url(#card)"/>
  <text x="120" y="550" font-size="40" font-weight="700" letter-spacing="-1" fill="#1e2230">Built to convert, easy to love</text>
  <text x="120" y="586" font-size="16" font-weight="600" fill="#8b93a7">June 11, 2026 · by <tspan fill="#4f46e5">Anthony</tspan></text>
  <g font-size="20" fill="#4a5168">
    <text x="120" y="634">Crisp geometric type on a soft white surface, violet-to-indigo accents,</text>
    <text x="120" y="666">and accessible focus states baked in. Fast, modern, and translation</text>
    <text x="120" y="698">ready — no page builders required.</text>
  </g>
  <rect x="120" y="720" width="172" height="40" rx="20" fill="url(#grad)" filter="url(#btn)"/>
  <text x="142" y="746" font-size="16" font-weight="700" fill="#ffffff">Read more →</text>

  <!-- Footer -->
  <rect x="0" y="836" width="1200" height="64" fill="#ffffff"/>
  <line x1="0" y1="836" x2="1200" y2="836" stroke="#e6e9f2" stroke-width="2"/>
  <text x="600" y="876" font-size="16" fill="#8b93a7" text-anchor="middle">© 2026 Nimbus. Built with Nimbus.</text>
</svg>
